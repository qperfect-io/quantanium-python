name: Test_building_ubuntu

on:
  workflow_dispatch:
env:
  FORCE_COLOR: 3
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true 

jobs:

  build_sdist:
    name: Build SDist
    runs-on: ubuntu-latest
    steps:
    - name: Configure Git credentials for GitHub and GitLab
      run: |
        git config --global url."https://oauth2:${{ secrets.QUANTANIUM_READ_PAT }}@gitlab.qperfect.io/".insteadOf "https://gitlab.qperfect.io/"

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Inject GitLab credentials into git's credential store
    - name: Configure GitLab token
      run: |
        git config --global credential.helper store
        echo "https://oauth2:${{ secrets.QUANTANIUM_READ_PAT }}@gitlab.qperfect.io" \
          >> ~/.git-credentials

    # 3. Now initialize and update the GitLab submodule
    - name: Init and update submodules
      run: |
        git submodule update --init --recursive

    - name: Install boost
      uses: MarkusJx/install-boost@v2.4.5
      id: install-boost
      with:
          # REQUIRED: Specify the required boost version
          # A list of supported versions can be found here:
          # https://github.com/MarkusJx/prebuilt-boost/blob/main/versions-manifest.json
          boost_version: 1.86.0

    - name: Build SDist
      run: pipx run build --sdist

    - name: Check metadata
      run: pipx run twine check dist/*

    - uses: actions/upload-artifact@v4
      with:
        name: cibw-sdist
        path: dist/*.tar.gz

  build_ubuntu_wheels:
    needs: build_sdist
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64

    uses: ./.github/workflows/build_core.yml
    with:
      matrix_os: ${{ matrix.os }}
      matrix_arch: ${{ matrix.arch }}
      BOOST_ROOT: ${{ needs.build_sdist.steps.install-boost.outputs.BOOST_ROOT }}
    secrets: inherit